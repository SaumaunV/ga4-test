<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GA4 Parameter Test</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S5FQWEVJ1E"></script> 
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    </script>

    <script>
    (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const paramsToCapture = ['uid', 'utm_source', 'utm_medium', 'utm_campaign'];
    let capturedData = {};

    // 1. Always check URL and update LocalStorage if new data exists
    paramsToCapture.forEach(param => {
        const value = urlParams.get(param);
        if (value) {
            localStorage.setItem('al_' + param, value);
            capturedData[param] = value;
        }
    });

    // 2. Check URL OR LocalStorage for an ID
    const finalId = capturedData['uid'] || localStorage.getItem('al_uid');

    if (finalId) {
        if (typeof gtag === 'function') {
            // Set properties
            gtag('set', 'user_properties', { 'contact_id': finalId });
            gtag('set', { 'user_id': finalId });

            // 3. Fire the Config (This is the "Start" button)
            gtag('config', 'G-S5FQWEVJ1E', {
                'debug_mode': true,
                'user_id': finalId
            });

            // 4. Push to DataLayer (Only if new data was actually in the URL)
            if (Object.keys(capturedData).length > 0) {
                window.dataLayer.push({
                    'event': 'campaign_data_captured',
                    'attribution_data': capturedData,
                    'contact_id': finalId
                });
            }
        }
    } else {
        console.log("Anonymous user detected");
    }
})();
    </script>
</head>
<body>
    <h1>GA4 Parameter Test Page</h1>
</body>
</html>
