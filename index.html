<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GA4 Parameter Test</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S5FQWEVJ1E"></script> 
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    </script>

    <script>
    (function() {
    const urlParams = new URLSearchParams(window.location.search);
    
    // List of parameters
    const paramsToCapture = ['uid', 'utm_source', 'utm_medium', 'utm_campaign'];
    let capturedData = {};

    paramsToCapture.forEach(param => {
        const value = urlParams.get(param);
        if (value) {
            // Save to individual keys in LocalStorage
            localStorage.setItem('al_' + param, value);
            capturedData[param] = value;
        }
    });

    if (Object.keys(capturedData).length > 0) {
        if (typeof gtag === 'function') {
            const finalId = capturedData['uid'] || localStorage.getItem('al_uid');

            if (finalId) {
                // 1. Set the User ID (System Level)
                gtag('set', 'user_properties', {
                    'contact_id': finalId
                });

                // 2. Set the User ID for Cross-Device Tracking
                gtag('set', { 'user_id': finalId });

                // 3. Fire the Config with all parameters
                gtag('config', 'G-S5FQWEVJ1E', {
                    'debug_mode': true,
                    'user_id': finalId
                });
            }
        }

        // 4. Push to DataLayer for GTM
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
            'event': 'campaign_data_captured',
            'attribution_data': capturedData,
            'contact_id': capturedData['uid']
        });
    }
})();
    </script>
</head>
<body>
    <h1>GA4 Parameter Test Page</h1>
</body>
</html>
